services:
  postgres:
    image: postgres:16-alpine
    container_name: axm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: axm
      POSTGRES_PASSWORD: axm
      POSTGRES_DB: axm
    ports:
      - '5432:5432'
    volumes:
      - axm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U axm -d axm']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  axm_pg_data:
