services:
  - type: web
    name: axm-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma db push
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://axm-project-mng.vercel.app
      - key: UPLOAD_DIR
        value: ./uploads
